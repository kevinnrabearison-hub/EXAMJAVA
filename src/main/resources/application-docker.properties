# ============================================================
# FoodFrenzy — Profil DOCKER (production container)
# Activé via : SPRING_PROFILES_ACTIVE=docker
# Les valeurs viennent des variables d'env Docker Compose
# ============================================================

spring.datasource.name=FoodFrenzy
spring.datasource.url=jdbc:mysql://foodfrenzy-db:3306/FoodFrenzy?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Actuator — healthcheck utilisé par Docker et Jenkins
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.server.port=8080

server.port=8080